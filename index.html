<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Census Income Predictor</title>
    <meta name="description" content="Predict whether income exceeds $50K/yr based on census data.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>Income Predictor</h1>
            <p>Enter demographic data to predict if annual income exceeds $50K.</p>
        </header>

        <!-- Main Form Panel -->
        <form id="prediction-form" class="form-panel">
            <div class="form-grid">
                <!-- Numeric Inputs -->
                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required min="17" max="90" placeholder="e.g. 35">
                </div>
                
                <div class="input-group">
                    <label for="hours-per-week">Hours Per Week</label>
                    <input type="number" id="hours-per-week" name="hours-per-week" required min="1" max="99" placeholder="e.g. 40">
                </div>

                <div class="input-group">
                    <label for="capital-gain">Capital Gain ($)</label>
                    <input type="number" id="capital-gain" name="capital-gain" required min="0" value="0">
                </div>

                <div class="input-group">
                    <label for="capital-loss">Capital Loss ($)</label>
                    <input type="number" id="capital-loss" name="capital-loss" required min="0" value="0">
                </div>

                <!-- Categorical Inputs -->
                <div class="input-group full-width">
                    <label for="workclass">Workclass</label>
                    <select id="workclass" name="workclass" required>
                        <option value="" disabled selected>Select Workclass</option>
                        <option value="Private">Private</option>
                        <option value="Self-emp-not-inc">Self-Employed (Not Incorporated)</option>
                        <option value="Self-emp-inc">Self-Employed (Incorporated)</option>
                        <option value="Federal-gov">Federal Government</option>
                        <option value="Local-gov">Local Government</option>
                        <option value="State-gov">State Government</option>
                        <option value="Without-pay">Without Pay</option>
                        <option value="Never-worked">Never Worked</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label for="education">Education</label>
                    <select id="education" name="education" required>
                        <option value="" disabled selected>Select Education Level</option>
                        <option value="Bachelors">Bachelors</option>
                        <option value="Some-college">Some College</option>
                        <option value="11th">11th Grade</option>
                        <option value="HS-grad">High School Grad</option>
                        <option value="Prof-school">Professional School</option>
                        <option value="Assoc-acdm">Associate Academic</option>
                        <option value="Assoc-voc">Associate Vocational</option>
                        <option value="9th">9th Grade</option>
                        <option value="7th-8th">7th-8th Grade</option>
                        <option value="12th">12th Grade</option>
                        <option value="Masters">Masters</option>
                        <option value="1st-4th">1st-4th Grade</option>
                        <option value="10th">10th Grade</option>
                        <option value="Doctorate">Doctorate</option>
                        <option value="5th-6th">5th-6th Grade</option>
                        <option value="Preschool">Preschool</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label for="marital-status">Marital Status</label>
                    <select id="marital-status" name="marital-status" required>
                        <option value="" disabled selected>Select Status</option>
                        <option value="Married-civ-spouse">Married (Civilian Spouse)</option>
                        <option value="Divorced">Divorced</option>
                        <option value="Never-married">Never Married</option>
                        <option value="Separated">Separated</option>
                        <option value="Widowed">Widowed</option>
                        <option value="Married-spouse-absent">Married (Spouse Absent)</option>
                        <option value="Married-AF-spouse">Married (Armed Forces Spouse)</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label for="occupation">Occupation</label>
                    <select id="occupation" name="occupation" required>
                        <option value="" disabled selected>Select Occupation</option>
                        <option value="Tech-support">Tech Support</option>
                        <option value="Craft-repair">Craft Repair</option>
                        <option value="Other-service">Other Service</option>
                        <option value="Sales">Sales</option>
                        <option value="Exec-managerial">Executive Managerial</option>
                        <option value="Prof-specialty">Professional Specialty</option>
                        <option value="Handlers-cleaners">Handlers Cleaners</option>
                        <option value="Machine-op-inspct">Machine Operator / Inspector</option>
                        <option value="Adm-clerical">Admin Clerical</option>
                        <option value="Farming-fishing">Farming Fishing</option>
                        <option value="Transport-moving">Transport Moving</option>
                        <option value="Priv-house-serv">Private House Service</option>
                        <option value="Protective-serv">Protective Service</option>
                        <option value="Armed-Forces">Armed Forces</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="relationship">Relationship</label>
                    <select id="relationship" name="relationship" required>
                        <option value="" disabled selected>Select Relationship</option>
                        <option value="Wife">Wife</option>
                        <option value="Own-child">Own Child</option>
                        <option value="Husband">Husband</option>
                        <option value="Not-in-family">Not in Family</option>
                        <option value="Other-relative">Other Relative</option>
                        <option value="Unmarried">Unmarried</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="race">Race</label>
                    <select id="race" name="race" required>
                        <option value="" disabled selected>Select Race</option>
                        <option value="White">White</option>
                        <option value="Asian-Pac-Islander">Asian/Pacific Islander</option>
                        <option value="Amer-Indian-Eskimo">Amer-Indian/Eskimo</option>
                        <option value="Other">Other</option>
                        <option value="Black">Black</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="sex">Sex</label>
                    <select id="sex" name="sex" required>
                        <option value="" disabled selected>Select Sex</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="native-country">Native Country</label>
                    <select id="native-country" name="native-country" required>
                        <option value="" disabled selected>Select Country</option>
                        <option value="United-States">United States</option>
                        <option value="Cambodia">Cambodia</option>
                        <option value="England">England</option>
                        <option value="Puerto-Rico">Puerto Rico</option>
                        <option value="Canada">Canada</option>
                        <option value="Germany">Germany</option>
                        <option value="Outlying-US(Guam-USVI-etc)">Outlying US</option>
                        <option value="India">India</option>
                        <option value="Japan">Japan</option>
                        <option value="Greece">Greece</option>
                        <option value="South">South</option>
                        <option value="China">China</option>
                        <option value="Cuba">Cuba</option>
                        <option value="Iran">Iran</option>
                        <option value="Honduras">Honduras</option>
                        <option value="Philippines">Philippines</option>
                        <option value="Italy">Italy</option>
                        <option value="Poland">Poland</option>
                        <option value="Jamaica">Jamaica</option>
                        <option value="Vietnam">Vietnam</option>
                        <option value="Mexico">Mexico</option>
                        <option value="Portugal">Portugal</option>
                        <option value="Ireland">Ireland</option>
                        <option value="France">France</option>
                        <option value="Dominican-Republic">Dominican Republic</option>
                        <option value="Laos">Laos</option>
                        <option value="Ecuador">Ecuador</option>
                        <option value="Taiwan">Taiwan</option>
                        <option value="Haiti">Haiti</option>
                        <option value="Columbia">Columbia</option>
                        <option value="Hungary">Hungary</option>
                        <option value="Guatemala">Guatemala</option>
                        <option value="Nicaragua">Nicaragua</option>
                        <option value="Scotland">Scotland</option>
                        <option value="Thailand">Thailand</option>
                        <option value="Yugoslavia">Yugoslavia</option>
                        <option value="El-Salvador">El Salvador</option>
                        <option value="Trinadad&Tobago">Trinidad & Tobago</option>
                        <option value="Peru">Peru</option>
                        <option value="Hong">Hong</option>
                        <option value="Holand-Netherlands">Holand-Netherlands</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="submit-btn">
                        <span class="btn-text">Predict Income</span>
                        <div class="loader hidden"></div>
                    </button>
                </div>
            </div>
        </form>

        <!-- Result Panel -->
        <div id="result-container" class="result-panel hidden">
            <h2>Prediction Result</h2>
            <div id="result-value" class="result-value"></div>
            <p id="result-desc" class="result-desc"></p>
            <button id="reset-btn" class="btn-secondary">Predict Another</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
